---
"name": "Health Check"
"on":
  "pull_request":
    "types":
      - "opened"
      - "synchronize"
      - "reopened"
  "push":
    "branches":
      - "main"
  "schedule":
    -
      "cron": "0 1 * * *"
"defaults":
  "run":
    "shell": "bash"
"env":
  "PYTHONDONTWRITEBYTECODE": 1
  "UV_NO_SYNC": 1
"run-name": "Health Check"
"jobs":
  "health-checks":
    "runs-on": "ubuntu-latest"
    "steps":
      -
        "name": "Checkout Repository"
        "id": "checkout-repository"
        "uses": "actions/checkout@main"
      -
        "name": "Setup Package Manager"
        "id": "setup-package-manager"
        "uses": "astral-sh/setup-uv@main"
        "with":
          "python-version": "3.13"
      -
        "name": "Update Dependencies"
        "id": "update-dependencies"
        "run": "uv lock --upgrade"
      -
        "name": "Install Dependencies"
        "id": "install-dependencies"
        "run": "uv sync"
      -
        "name": "Install Pyside System Dependencies"
        "id": "install-pyside-system-dependencies"
        "if": "runner.os == 'Linux'"
        "run": |-
          sudo \
          apt-get \
          update \
          && \
          sudo \
          apt-get \
          install \
          -y \
          libegl1 \
          libpulse0
      -
        "name": "Create Version Control Ignored Files"
        "id": "create-version-control-ignored-files"
        "run": "uv run pyrig mk local"
      -
        "name": "Run Version Control Hooks"
        "id": "run-version-control-hooks"
        "run": "uv run prek run --all-files --group all"
  "matrix-health-checks":
    "runs-on": "${{ matrix.os }}"
    "strategy":
      "matrix":
        "os":
          - "ubuntu-latest"
          - "windows-latest"
          - "macos-latest"
        "python-version":
          - "3.12"
          - "3.13"
      "fail-fast": true
    "steps":
      -
        "name": "Checkout Repository"
        "id": "checkout-repository"
        "uses": "actions/checkout@main"
      -
        "name": "Setup Package Manager"
        "id": "setup-package-manager"
        "uses": "astral-sh/setup-uv@main"
        "with":
          "python-version": "${{ matrix.python-version }}"
      -
        "name": "Update Dependencies"
        "id": "update-dependencies"
        "run": "uv lock --upgrade"
      -
        "name": "Install Dependencies"
        "id": "install-dependencies"
        "run": "uv sync"
      -
        "name": "Install Pyside System Dependencies"
        "id": "install-pyside-system-dependencies"
        "if": "runner.os == 'Linux'"
        "run": |-
          sudo \
          apt-get \
          update \
          && \
          sudo \
          apt-get \
          install \
          -y \
          libegl1 \
          libpulse0
      -
        "name": "Run Tests"
        "id": "run-tests"
        "run": "uv run pytest"
        "env":
          "QT_QPA_PLATFORM": "offscreen"
          "QTWEBENGINE_DISABLE_SANDBOX": "1"
          "QTWEBENGINE_CHROMIUM_FLAGS": |-
            --no-sandbox \
            --disable-gpu \
            --disable-software-rasterizer \
            --disable-dev-shm-usage
  "health-check":
    "needs":
      - "health-checks"
      - "matrix-health-checks"
    "runs-on": "ubuntu-latest"
    "steps":
      -
        "name": "Aggregate Jobs"
        "id": "aggregate-jobs"
        "run": "echo 'Aggregating jobs into one job.'"
...
