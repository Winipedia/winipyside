---
"name": "Release"
"on":
  "workflow_run":
    "branches":
      - "main"
    "types":
      - "completed"
    "workflows":
      - "Health Check"
"defaults":
  "run":
    "shell": "bash"
"env":
  "PYTHONDONTWRITEBYTECODE": 1
  "UV_NO_SYNC": 1
"run-name": "Release"
"jobs":
  "publish":
    "if": |-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    "permissions":
      "contents": "write"
    "runs-on": "ubuntu-latest"
    "steps":
      -
        "name": "Checkout Repository"
        "id": "checkout-repository"
        "uses": "actions/checkout@main"
      -
        "name": "Setup Package Manager"
        "id": "setup-package-manager"
        "uses": "astral-sh/setup-uv@main"
        "with":
          "python-version": "3.13"
      -
        "name": "Apply Repository Settings"
        "id": "apply-repository-settings"
        "run": "bash .github/configure.sh settings"
        "env":
          "GH_TOKEN": "${{ secrets.REPO_TOKEN }}"
      -
        "name": "Apply Rulesets"
        "id": "apply-rulesets"
        "run": "bash .github/configure.sh rulesets"
        "env":
          "GH_TOKEN": "${{ secrets.REPO_TOKEN }}"
      -
        "name": "Create Tag"
        "id": "create-tag"
        "run": "git tag $(uv version --short)"
      -
        "name": "Push Tag"
        "id": "push-tag"
        "run": "git push origin $(uv version --short)"
      -
        "name": "Extract Version"
        "id": "extract-version"
        "run": "echo \"version=$(uv version --short)\" >> $GITHUB_OUTPUT"
      -
        "name": "Build Changelog"
        "id": "build-changelog"
        "uses": "mikepenz/release-changelog-builder-action@develop"
        "with":
          "token": "${{ secrets.GITHUB_TOKEN }}"
      -
        "name": "Create Release"
        "id": "create-release"
        "uses": "ncipollo/release-action@main"
        "with":
          "body": "${{ steps.build-changelog.outputs.changelog }}"
          "name": "${{ steps.extract-version.outputs.version }}"
          "tag": "${{ steps.extract-version.outputs.version }}"
...
